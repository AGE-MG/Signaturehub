<div
  class="settings-page"
>
  <div
    class="page-header"
  >
    <h1
      class="page-title"
    >
      Configurações
    </h1>
    <p
      class="page-subtitle"
    >
      Gerencie seus perfil e preferências
    </p>
  </div>

  <mat-tab-group
    class="settings-tabs"
    animationDuration="200ms"
  >
    <mat-tab>
      <ng-template
        mat-tab-label
      >
        <mat-icon>person</mat-icon>
        Meu Perfil
      </ng-template>

      <div
        class="tab-content"
      >
        @if (loadingProfile) {
          <div
            class="loading-state"
          >
            <mat-progress-spinner mode="indeterminate" color="primary" diameter="40"></mat-progress-spinner>
          </div>
        } @else {
          <div
            class="profile-layout"
          >
            <!-- Avatar card -->
            <mat-card
              class="avatar-card"
            >
              <div
                class="avatar-circle"
              >
                {{ getInitials(currentUser?.fullName ?? '?') }}
              </div>
              <h3>
                {{ currentUser?.fullName }}
              </h3>
              <p>{{ currentUser?.email }}</p>
              <div
                class="role-chips"
              >
                @for (role of currentUser?.roles ?? []; track role) {
                  <span
                    class="role-chip"
                  >
                    {{ role }}
                  </span>
                }
              </div>
            </mat-card>

            <!-- Profile Form-->
            <mat-card
              class="form-card"
            >
              <h3
                class="section-title"
              >
                Informações Pessoais
              </h3>
              <mat-divider></mat-divider>
              <form [formGroup]="profileForm" class="profile-form">
                <!-- Form fields go here -->
              </form>
            </mat-card>
          </div>
        }
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
