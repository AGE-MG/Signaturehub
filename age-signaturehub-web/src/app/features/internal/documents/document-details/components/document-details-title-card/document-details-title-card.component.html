<mat-card class="title-card">
  <div class="title-card-content">
    <mat-icon [style.color]="fileIconColor" class="doc-main-icon">
      {{ fileIcon }}
    </mat-icon>

    <div class="title-info">
      <h2 class="doc-title">{{ document.title }}</h2>
      <p class="doc-filename">{{ document.originalFileName }}</p>
      @if (document.description) {
        <p class="doc-description">{{ document.description }}</p>
      }
    </div>

    <div class="title-badges">
      @if (document.owningDepartment) {
        <span class="status-chip">
          {{ document.owningDepartment }}
        </span>
      }
      @if (document.isConfidential) {
        <span class="status-chip" style="background:#7f1d1d18;color:#991b1b;border-color:#991b1b50;">
          Sigiloso
        </span>
      }
      <span
        class="status-chip"
        [style.background]="statusColor[document.status] + '18'"
        [style.color]="statusColor[document.status]"
        [style.border-color]="statusColor[document.status] + '50'"
      >
        {{ statusLabel[document.status] }}
      </span>
    </div>
  </div>
</mat-card>
