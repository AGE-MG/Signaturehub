<header
  class="topbar"
>
  <div
    class="topbar-left"
  >
    <h1
      class="page-title"
    >
      Dashboard
    </h1>
  </div>

  <div
    class="topbar-right"
  >
    <!-- Notifications -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="notificationMenu"
      class="notification-btn"
    >
      <mat-icon
        [matBadge]="unreadCount"
        [matBadgeHidden]="unreadCount === 0"
        matBadgeColor="warn"
        aria-hidden="false"
      >
        {{ unreadCount > 0 ? 'notifications' : 'notifications_none' }}
      </mat-icon>
    </button>

    <!-- User Menu -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="userMenu"
      class="user-btn"
    >
      <div class="user-avatar">{{ getUserInitials() }}</div>
      <div class="user-info">
        <span class="user-name">{{ getUserDisplayName() }}</span>
        <span class="user-role">{{ currentUser?.position }}</span>
      </div>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
  </div>
</header>

<!-- Notification Menu -->
<mat-menu
  #notificationMenu="matMenu"
  class="notification-menu"
>
  <div
    class="menu-header"
    (click)="$event.stopPropagation()"
  >
    <h3>
      Notificações
    </h3>
    <button
      mat-button
      color="primary"
      [disabled]="unreadCount === 0"
      [style.visibility]="unreadCount > 0 ? 'visible' : 'hidden'"
      (click)="markAllAsRead()"
    >
      Marcar todas como lidas
    </button>
  </div>
  <mat-divider></mat-divider>

  <div
    class="loading-notifications"
    (click)="$event.stopPropagation()"
    [style.display]="loadingNotifications ? 'flex' : 'none'"
  >
    <mat-spinner diameter="30"></mat-spinner>
  </div>

  <div
    class="empty-notifications"
    (click)="$event.stopPropagation()"
    [style.display]="!loadingNotifications && notifications.length === 0 ? 'block' : 'none'"
  >
    <p>Nenhuma notificação</p>
  </div>

  <div [style.display]="!loadingNotifications && notifications.length > 0 ? 'block' : 'none'">
    @for (notification of notifications.slice(0, 5); track notification.id) {
      <button
        mat-menu-item
        class="notification-item"
        [class.unread]="!notification.isRead"
        (click)="viewNotification(notification)"
      >
        <mat-icon
          [style.color]="getNotificationColor(notification.type)"
        >
          {{ getNotificationIcon(notification.type) }}
        </mat-icon>
        <div
          class="notification-content"
        >
          <p class="notification-title">{{ notification.title }}</p>
          <p class="notification-message">{{ notification.message }}</p>
          <span class="notification-time">{{ getRelativeTime(notification.createdAt) }}</span>
        </div>
        <button
          mat-icon-button
          class="mark-read-btn"
          [disabled]="notification.isRead"
          [style.visibility]="notification.isRead ? 'hidden' : 'visible'"
          (click)="markAsRead(notification, $event)"
          matTooltip="Marcar como lida"
        >
          <mat-icon>check</mat-icon>
        </button>
      </button>
    }

    <mat-divider [style.display]="notifications.length > 5 ? 'block' : 'none'"></mat-divider>
    <button
      mat-menu-item
      class="view-all"
      [style.display]="notifications.length > 5 ? 'block' : 'none'"
      (click)="viewAllNotifications()"
    >
      Ver todas as notificações ({{ notifications.length }})
    </button>
  </div>
</mat-menu>

<!-- User Menu -->
<mat-menu
  #userMenu="matMenu"
  class="user-menu"
>
  <button mat-menu-item (click)="goToProfile()">
    <mat-icon>person</mat-icon>
    <span>Meu Perfil</span>
  </button>
  <button mat-menu-item (click)="goToSettings()">
    <mat-icon>settings</mat-icon>
    <span>Configurações</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="goToHelp()">
    <mat-icon>help</mat-icon>
    <span>Ajuda</span>
  </button>
</mat-menu>
