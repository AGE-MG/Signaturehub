<header
  class="topbar"
>
    <div
      class="topbar-left"
    >
    <h1
      class="page-title"
    >
      Dashboard
    </h1>
  </div>

  <div
    class="topbar-right"
  >
    <button
      mat-icon-button
      [matMenuTriggerFor]="notificationMenu"
      class="notification-btn"
    >
      <mat-icon [matBadge]="notificationCount" matBadgeColor="warn">notifications</mat-icon>
    </button>

    <button
      mat-button
      [matMenuTriggerFor]="userMenu"
      class="user-btn"
    >
      <div class="user-avatar">{{ getUserInitials() }}</div>
      <div
        class="user-info"
      >
        <span class="user-name">{{ currentUser?.fullName }}</span>
        <span class="user-role">{{ currentUser?.position }}</span>
      </div>
      <mat-icon>keyboard_arrow_down</mat-icon>
    </button>
  </div>
</header>

<mat-menu
  #notificationMenu="matMenu"
  class="notification-menu"
>
  <div
    class="menu-header"
  >
    <h3>
      Notificações
    </h3>
    <button
      mat-button
      color="primary"
    >
      Marcar todas como lidas
    </button>
  </div>
  <mat-divider></mat-divider>

  <button mat-menu-item class="notification-item">
    <mat-icon>description</mat-icon>
    <div class="notification-content">
      <p class="notification-title">Novo documento para assinar</p>
      <span class="notification-time">Há 5 minutos</span>
    </div>
  </button>

  <button mat-menu-item class="notification-item">
    <mat-icon>check_circle</mat-icon>
    <div class="notification-content">
      <p class="notification-title">Documento assinado com sucesso</p>
      <span class="notification-time">Há 2 horas</span>
    </div>
  </button>

  <mat-divider></mat-divider>

  <button
    mat-menu-item
    class="view-all"
  >
    Ver todas as notificações
  </button>
</mat-menu>

<mat-menu
  #userMenu="matMenu"
  class="user-menu"
>
  <button
    mat-menu-item
  >
    <mat-icon>person</mat-icon>
    <span>Perfil</span>
  </button>

  <button
    mat-menu-item
  >
    <mat-icon>settings</mat-icon>
    <span>Configurações</span>
  </button>

  <mat-divider></mat-divider>

  <button
    mat-menu-item
  >
    <mat-icon>help</mat-icon>
    <span>Ajuda</span>
  </button>
</mat-menu>
